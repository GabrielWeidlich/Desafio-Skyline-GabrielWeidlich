version: '3.8'

services:
  backend:
    build:
      context: ./src
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=${DATABASE_URL}
      - PORT=${PORT:-3000}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./src:/app
      - ./src/package.json:/app/package.json
      - ./drizzle.config.ts:/app/drizzle.config.ts
      - ./scripts:/app/scripts
      - ./scripts/wait-for-it.sh:/app/scripts/wait-for-it.sh
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    command: sh -c "chmod +x scripts/migrate.sh && ./scripts/migrate.sh && npm run dev"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-skyline_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
